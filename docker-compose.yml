services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-vertex-wfirma-dev}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-europe-west9}
      MODEL_NAME: ${MODEL_NAME:-gemini-2.5-flash}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/vertex-wfirma-dev-ea19981c2c30.json
      LEGAL_SOURCES_DIR: /legal_sources
    volumes:
      - ./secrets:/secrets:ro
      - ./legal_sources:/legal_sources
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
