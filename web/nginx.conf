server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets (JS/CSS) — brak fallbacku na index.html, zwracaj 404 jak nie ma.
    location /assets/ {
        try_files $uri =404;
    }

    # Partials (HTML fragments) — to samo, strict.
    location /partials/ {
        try_files $uri =404;
    }

    # SPA entry — tylko dla root-a i nieznanych route'ów
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy do FastAPI
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # PDF-y mogą być większe, bufor
        proxy_buffering off;
        client_max_body_size 10M;
    }

    # Proste security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Cache assets (CSS, JS) — ale nie index.html
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
